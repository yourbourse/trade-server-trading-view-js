<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - YourBourse Trading Platform</title>
    <link rel="stylesheet" href="/css/signin.css">
</head>
<body>
    <div class="signin-container">
        <div class="signin-card">
            <div class="signin-header">
                <h2>Welcome Back!</h2>
                <p>Sign in to your account to continue</p>
            </div>

            <form id="signin-form" class="signin-form">
                <div id="error-message" class="error-message" style="display: none;"></div>

                <div class="form-group">
                    <label for="login">Login</label>
                    <input 
                        type="number" 
                        id="login" 
                        name="login" 
                        class="form-control" 
                        placeholder="123456" 
                        min="1"
                        step="1"
                        required
                    />
                    <span class="error-text" id="login-error"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-control" 
                        placeholder="Enter your password" 
                        required
                    />
                    <span class="error-text" id="password-error"></span>
                </div>

                <div class="form-group">
                    <label for="server">Server</label>
                    <input 
                        type="url" 
                        id="server" 
                        name="server" 
                        class="form-control" 
                        placeholder="https://uat.api.yourbourse.trade:3XXXX" 
                        value="https://uat.api.yourbourse.trade:3XXXX"
                        required
                    />
                    <span class="error-text" id="server-error"></span>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">
                    <span id="btn-text">Sign In</span>
                    <span id="btn-spinner" class="spinner" style="display: none;"></span>
                </button>
            </form>

            <div class="signin-footer">
                <p>TradingView Trading Platform • YourBourse</p>
                <p class="version-info" id="app-version">v0.0.0</p>
            </div>
        </div>
    </div>

    <script type="module" src="/src/signin.ts"></script>
</body>
</html>
