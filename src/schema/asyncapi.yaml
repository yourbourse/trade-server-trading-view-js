        - Day
        - Ms
    Order:
      title: Order
      type: object
      properties:
        id:
          description: Order unique identifier.
          type: integer
          format: int64
          minimum: 1
          example: 1263159
        s:
          $ref: '#/components/schemas/SymbolName'
        q:
          $ref: '#/components/schemas/QuantityLots'
        S:
          $ref: '#/components/schemas/Side'
        t:
          $ref: '#/components/schemas/OrderType'
        fq:
          description: Filled quantity.
          type: number
        ap:
          description: >
            Average price of order fills. It should be provided for
            filled/partially filled orders.
          type: number
        lp:
          description: >-
            Limit price for limit or stop limit orders only. You should not send
            this field for other order types.
          type: number
          example: 1.14214
        sp:
          description: >-
            Stop price for stop or stop limit orders only. You should not send
            this field for other order types.
          type: number
        poi:
          description: >
            Identifier of a parent order. Should be set only for bracket orders.
          type: integer
          format: int64
          minimum: 1
        ppi:
          description: >
            Identifier of a parent position. Should be set only for bracket orders.
          type: integer
          format: int64
          minimum: 1
        tif:
          $ref: '#/components/schemas/TimeInForce'
        tt:
          description: >-
            If `tif` is `gtd` - microseconds since the Unix epoch; if `tif` is
            `ms` - milliseconds since order placement.
          type: number
        C:
          description: >-
            Date/time when the order was created (microseconds since the
            Unix epoch).
          type: number
        M:
          description: >-
            Date/time when the order was last modified (microseconds since the
            Unix epoch).
          type: number
        st:
          description: >
            String constants to describe an order status.


            Status  | Description

            ----------|-------------

            Inactive  | Stop Loss or Take Profit order is created but waiting for a base order to
            be filled.

            Working   | Order is created and active but not executed yet.

            PartiallyFilled    | Order is partially filled and still active.

            Filled    | Order is fully filled.

            Cancelled  | Order has been cancelled.

            Rejected  | Order has been rejected.

            Expired  | Order has expired.
          type: string
          enum:
            - Inactive
            - Working
            - PartiallyFilled
            - Filled
            - Cancelled
            - Rejected
            - Expired
          example: Working
        ct:
          $ref: '#/components/schemas/OrderComment'
        slid:
          type: integer
          format: int64
          description: Stop Loss order unique identifier (if SL is set)
        tpid:
          type: integer
          format: int64
          description: Take Profit order unique identifier (if TP is set)
      required:
        - id
        - s
        - q
        - S
        - t
        - st
        - tif
        - C
        - M
      additionalProperties: false

