      title: Unsubscribe from cash/asset transfer updates.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TransfersUnsubscribeRequest'
    TransfersSubscriptionRequestAck:
      name: TransfersSubscriptionRequestAck
      title: Subscription request acknowledgement
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TransfersSubscriptionRequestAck'
    Transfers:
      name: Transfers
      title: Cash/asset transfer updates
      contentType: application/json
      payload:
        $ref: '#/components/schemas/Transfers'
    OrdersSubscribeRequest:
      name: OrdersSubscribeRequest
      title: Subscribe for real-time order updates.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/OrdersSubscribeRequest'
    OrdersUnsubscribeRequest:
      name: OrdersUnsubscribeRequest
      title: Unsubscribe from real-time order updates.
      contentType: application/json
      payload:
