asyncapi: 3.0.0
info:
  title: Your Bourse Trading Platform WebSocket API
  version: 26.2.23
  description: >-
    [Download](/docs/ws-api/asyncapi.yaml) AsyncAPI specification.


    # General API Information


    This document serves as high-level specifications for [Your
    Bourse](https://yourbourse.com)'s trading platform WebSocket APIs.


    A single connection to the API endpoint is only valid for 24 hours; expect
    to be disconnected after the 24-hour mark.


    WebSocket server will send a `ping` frame every 5 seconds.
      * If the websocket server does not receive a `pong` frame back from the connection within a 10 second period, the connection will be disconnected.
      * When you receive a `ping`, you must send a pong with a copy of `ping`'s payload as soon as possible.
      * Unsolicited `pong` frames are allowed, but will not prevent disconnection. It is recommended that the payload for these `pong` frames are empty.

    Lists are returned in **chronological order**, unless noted otherwise.


    All timestamps are in **microseconds** since the Unix epoch (00:00:00 UTC on
    1 January 1970), unless noted otherwise.


    All field names and values are **case-sensitive**, unless noted otherwise.


    # Rate Limits


    A single connection has a limit of 5 incoming messages per second:

    * `PING` frame

    * `PONG` frame

    * JSON controlled message (e.g. `subscribe`, `unsubscribe`)


    A connection that goes beyond the limit will be disconnected; IPs that are
    repeatedly disconnected may be banned. IP bans are tracked and scale in
    duration for repeat offenders.


    A single connection can listen to a maximum of 256 streams.


    Only 300 connection attempts per IP address are allowed every 5 minutes.


    Maximum of 10 simultaneous online connections per IP address are allowed.


    # Subscribing/unsubscribing to streams


    Send a subscription request to subscribe for updates.


    For example:

    ```

    {
      "m": "subscribe",
      "p": {
        "c": "orders",
        "snapshot": true
      },
      "h": {
        "X-YB-API-Key": "vJJErCZDZBD07z1p4Ed91t0qob6bAL",
        "locale": "en"
      },
      "reqId": "ABC777816"
    }

    ```


    For successful subscriptions the below response will be sent before the
    first data update:

    ```

    {
      "m": "subscribe",
      "p": {
        "c": "orders"
      },
      "s": true,
      "reqId": "ABC777816"
    }

    ```


    Send a request to unsubscribe from data updates:


    ```

    {
      "m": "unsubscribe",
      "p": [
        "c": "orders",
      ],
      "reqId": "ABC777816"
    }

    ```


    In case of an invalid subscription request, the following response will be
    sent:

    ```

    {
      "m": "subscribe",
      "p": {
        "c": "trades"
      },
      "s": false,
      "e": {
        "code": 10,
        "msg": "Symbol not found",
        "detail": "EURUSD"
      },
      "reqId": "ABC777816"
    }

    ```

    Server may send subscription acknowledgement as a result of configuration change like symbol deletion:

    ```
    {
      "m": "subscribe",
      "c": "L2",
      "p": {
        "s": "EURUSD"
      },
      "s": false,
      "e": {
        "code": 1,
        "msg": "",
        "detail": "EURUSD"
      },
      "reqId": "ABC777816"
    }
    ```

servers:
  UAT:
    host: https://<IP_address>:<port>/ws/v1
    protocol: wss
    description: Trade server WebSocket API endpoint
channels:
  trades:
    address: trades
    messages:
      TradesSubscribeRequest:
        $ref: '#/components/messages/TradesSubscribeRequest'
      TradesUnsubscribeRequest:
        $ref: '#/components/messages/TradesUnsubscribeRequest'
      Trades:
        $ref: '#/components/messages/Trades'
      TradesSubscriptionRequestAck:
        $ref: '#/components/messages/TradesSubscriptionRequestAck'
  positions:
    address: positions
    messages:
      PositionsSubscribeRequest:
        $ref: '#/components/messages/PositionsSubscribeRequest'
      PositionsUnsubscribeRequest:
        $ref: '#/components/messages/PositionsUnsubscribeRequest'
      PositionsSnapshot:
        $ref: '#/components/messages/PositionsSnapshot'
      PositionsAddedOrUpdated:
        $ref: '#/components/messages/PositionsAddedOrUpdated'
      PositionsDeleted:
        $ref: '#/components/messages/PositionsDeleted'
      PositionsSubscriptionRequestAck:
        $ref: '#/components/messages/PositionsSubscriptionRequestAck'
  orders:
    address: orders
    messages:
      OrdersSubscribeRequest:
        $ref: '#/components/messages/OrdersSubscribeRequest'
      OrdersUnsubscribeRequest:
        $ref: '#/components/messages/OrdersUnsubscribeRequest'
      Orders:
        $ref: '#/components/messages/Orders'
      OrdersSubscriptionRequestAck:
        $ref: '#/components/messages/OrdersSubscriptionRequestAck'
  balances:
    address: balances
    messages:
      BalancesSubscribeRequest:
        $ref: '#/components/messages/BalancesSubscribeRequest'
      BalancesUnsubscribeRequest:
        $ref: '#/components/messages/BalancesUnsubscribeRequest'
      Balances:
        $ref: '#/components/messages/Balances'
      BalancesSubscriptionRequestAck:
        $ref: '#/components/messages/BalancesSubscriptionRequestAck'
  states:
    address: states
    messages:
      AccountStatesSubscribeRequest:
        $ref: '#/components/messages/AccountStatesSubscribeRequest'
      AccountStatesUnsubscribeRequest:
        $ref: '#/components/messages/AccountStatesUnsubscribeRequest'
      AccountStates:
        $ref: '#/components/messages/AccountStates'
      AccountStatesSubscriptionRequestAck:
        $ref: '#/components/messages/AccountStatesSubscriptionRequestAck'
  transfers:
    address: transfers
    messages:
      TransfersSubscribeRequest:
        $ref: '#/components/messages/TransfersSubscribeRequest'
      TransfersUnsubscribeRequest:
        $ref: '#/components/messages/TransfersUnsubscribeRequest'
      Transfers:
        $ref: '#/components/messages/Transfers'
      TransfersSubscriptionRequestAck:
        $ref: '#/components/messages/TransfersSubscriptionRequestAck'
  ohlc:
    address: ohlc
    messages:
      CandlesSubscribeRequest:
        $ref: '#/components/messages/CandlesSubscribeRequest'
      CandlesUnsubscribeRequest:
        $ref: '#/components/messages/CandlesUnsubscribeRequest'
      Candles:
        $ref: '#/components/messages/Candles'
      CandlesSubscriptionRequestAck:
        $ref: '#/components/messages/CandlesSubscriptionRequestAck'
  L1:
    address: L1
    messages:
      QuoteSubscribeRequest:
        $ref: '#/components/messages/QuoteSubscribeRequest'
      QuoteUnsubscribeRequest:
        $ref: '#/components/messages/QuoteUnsubscribeRequest'
      Quotes:
        $ref: '#/components/messages/Quotes'
      QuoteSubscriptionRequestAck:
        $ref: '#/components/messages/QuoteSubscriptionRequestAck'
