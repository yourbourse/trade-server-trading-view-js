  schemas:
    Locale:
      title: Locale
      description: Locale (language) id.
      type: string
      enum:
        - en
      default: en
    reqId:
      description: Request unique identifier.
      type: string
      maxLength: 63
      example: 'ABC777816'
    SymbolName:
      description: Symbol name.
      type: string
      example: EURUSD

    OrderComment:
      description: Order comment.
      type: string
      maxLength: 63

    TradeComment:
      description: Trade comment.
      type: string
      maxLength: 63

    TransferComment:
      description: Transfer comment.
      type: string
      maxLength: 63

    SubscriptionMethod:
      description: Subscription method.
      type: string
      enum:
        - subscribe
        - unsubscribe
      example: subscribe
    SubscribeMethod:
      description: Subscription method.
      type: string
      enum:
        - subscribe
      example: subscribe
    UnsubscribeMethod:
      description: Subscription method.
      type: string
      enum:
        - unsubscribe
      example: unsubscribe
    ResponseType:
      type: string
      enum:
        - s
        - u
      example: u
      description: 'Response type: `s` - snapshot, `u` - update.
                    Subscription data streams typically start with a snapshot response followed by several update responses.
                    Some subscriptions (e.g. Market Data) may occasionally send a snapshot mid-stream, indicating that the
                    subscriber should clear any cached stream data as if a new subscription is started.'
    SnapshotResponseType:
      type: string
      enum:
        - s
      example: s
      description: 'Response type: `s` - snapshot.'
    UpdateResponseType:
      type: string
      enum:
        - u
      example: u
      description: 'Response type: `u` - update.'
    DeleteResponseType:
      type: string
      enum:
        - d
      example: d
      description: 'Response type: `d` - delete.'
    BalancesChannel:
      type: string
      description: Channel name (will always be `balances`).
      enum:
        - balances
      example: balances
    BalancesSubscribeRequest:
      title: BalancesSubscribeRequest
      type: object
      properties:
        m:
          $ref: '#/components/schemas/SubscribeMethod'
        c:
          $ref: '#/components/schemas/BalancesChannel'
        p:
          type: object
          properties:
            snapshot:
              description: >-
                `true` - send snapshot of all assets held in this account;
                `false` - updates only.
              type: boolean
              default: false
              example: true
          additionalProperties: false
        h:
          $ref: '#/components/schemas/CommonHeaders'
        reqId:
          $ref: '#/components/schemas/reqId'
      required:
        - m
        - c
        - p
        - h
      additionalProperties: false
    BalancesUnsubscribeRequest:
      title: BalancesUnsubscribeRequest
      type: object
      properties:
        m:
          $ref: '#/components/schemas/UnsubscribeMethod'
        c:
          $ref: '#/components/schemas/BalancesChannel'
        h:
          $ref: '#/components/schemas/CommonHeaders'
        reqId:
          $ref: '#/components/schemas/reqId'
      required:
        - m
        - c
        - h
      additionalProperties: false
    BalancesSubscriptionRequestAck:
      title: BalancesSubscriptionRequestAck
      type: object
      properties:
        m:
          $ref: '#/components/schemas/SubscriptionMethod'
        c:
          $ref: '#/components/schemas/BalancesChannel'
        s:
          $ref: '#/components/schemas/Status'
        e:
          $ref: '#/components/schemas/Error'
        reqId:
          $ref: '#/components/schemas/reqId'
      required:
        - m
        - c
        - s
      additionalProperties: false
    Balances:
      title: Balances
      type: object
      properties:
        c:
          $ref: '#/components/schemas/BalancesChannel'
        t:
          $ref: '#/components/schemas/ResponseType'
        d:
          type: array
          items:
            $ref: '#/components/schemas/Balance'
        reqId:
          $ref: '#/components/schemas/reqId'
      required:
        - c
        - t
        - d
      additionalProperties: false
    Balance:
      title: Balance
      type: object
      properties:
        a:
          type: string
          description: Asset.
          example: BTC
        d:
          type: string
          description: Asset description.
          example: Bitcoin
        t:
          type: number
          description: Total amount of the balance.
          example: 1000
        av:
