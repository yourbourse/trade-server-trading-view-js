    OrdersSubscriptionRequestAck:
      name: OrdersSubscriptionRequestAck
      title: Subscription request acknowledgement
      contentType: application/json
      payload:
        $ref: '#/components/schemas/OrdersSubscriptionRequestAck'
    Orders:
      name: Orders
      title: Order updates
      contentType: application/json
      payload:
        $ref: '#/components/schemas/Orders'
    PositionsSubscribeRequest:
