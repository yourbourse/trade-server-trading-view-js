    BookItem:
      title: BookItem
      type: object
      description: Depth of market for an instrument.
      properties:
        a:
          description: >-
            Asks - array of arrays with two numeric elements (price and volume).
            Sorted by `price` in ascending order.
          type: array
          items:
            $ref: '#/components/schemas/PriceBand'
        b:
          description: >-
            Bids - array of arrays with two numeric elements (price and volume).
            Sorted by `price` in descending order.
          type: array
          items:
            $ref: '#/components/schemas/PriceBand'
        s:
          $ref: '#/components/schemas/SymbolName'
        t:
          description: Timestamp (microseconds since the Unix epoch).
          type: number
          example: 1778942400000000
      required:
        - s
        - t
      additionalProperties: false
      example:
        a:
          - - 45.1
            - 100
          - - 48.4
            - 120
        b:
          - - 24.7
            - 80
          - - 35.6
            - 30
        s: EURUSD
        t: 1778942400000000
    PriceBand:
      title: PriceBand
      type: array
      description: Array with two numeric elements - price and volume.
      items:
        type: number
        minItems: 2
        maxItems: 2
