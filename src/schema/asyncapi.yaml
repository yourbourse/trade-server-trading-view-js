operations:
  BalancesSubscription:
    action: receive
    channel:
      $ref: '#/channels/balances'
    summary: Subscribe for balance/collateral updates.
    messages:
      - $ref: '#/channels/balances/messages/BalancesSubscribeRequest'
      - $ref: '#/channels/balances/messages/BalancesUnsubscribeRequest'
  Balances:
    action: send
    channel:
      $ref: '#/channels/balances'
    summary: Receive balance/collateral updates.
    messages:
      - $ref: '#/channels/balances/messages/BalancesSubscriptionRequestAck'
      - $ref: '#/channels/balances/messages/Balances'
  AccountStatesSubscription:
    action: receive
    channel:
      $ref: '#/channels/states'
    summary: Subscribe for trading account state updates.
    messages:
      - $ref: '#/channels/states/messages/AccountStatesSubscribeRequest'
      - $ref: '#/channels/states/messages/AccountStatesUnsubscribeRequest'
  AccountStates:
    action: send
    channel:
      $ref: '#/channels/states'
    summary: Receive trading account state updates.
    messages:
      - $ref: '#/channels/states/messages/AccountStatesSubscriptionRequestAck'
      - $ref: '#/channels/states/messages/AccountStates'
  TransfersSubscription:
    action: receive
    channel:
      $ref: '#/channels/transfers'
    summary: Subscribe for cash/asset transfer updates.
    messages:
      - $ref: '#/channels/transfers/messages/TransfersSubscribeRequest'
      - $ref: '#/channels/transfers/messages/TransfersUnsubscribeRequest'
  Transfers:
    action: send
    channel:
      $ref: '#/channels/transfers'
    summary: Receive cash/asset transfer updates.
    messages:
      - $ref: '#/channels/transfers/messages/TransfersSubscriptionRequestAck'
      - $ref: '#/channels/transfers/messages/Transfers'
  OrdersSubscription:
    action: receive
    channel:
      $ref: '#/channels/orders'
    summary: Subscribe for real-time order updates.
    messages:
      - $ref: '#/channels/orders/messages/OrdersSubscribeRequest'
      - $ref: '#/channels/orders/messages/OrdersUnsubscribeRequest'
  Orders:
    action: send
    channel:
      $ref: '#/channels/orders'
    summary: Receive real-time order updates.
    messages:
      - $ref: '#/channels/orders/messages/OrdersSubscriptionRequestAck'
      - $ref: '#/channels/orders/messages/Orders'
  PositionsSubscription:
    action: receive
    channel:
      $ref: '#/channels/positions'
    summary: Subscribe for real-time position updates.
    messages:
      - $ref: '#/channels/positions/messages/PositionsSubscribeRequest'
      - $ref: '#/channels/positions/messages/PositionsUnsubscribeRequest'
  Positions:
    action: send
    channel:
      $ref: '#/channels/positions'
    summary: Receive real-time position updates.
    messages:
      - $ref: '#/channels/positions/messages/PositionsSubscriptionRequestAck'
      - $ref: '#/channels/positions/messages/PositionsSnapshot'
      - $ref: '#/channels/positions/messages/PositionsAddedOrUpdated'
      - $ref: '#/channels/positions/messages/PositionsDeleted'
  TradesSubscription:
    action: receive
    channel:
      $ref: '#/channels/trades'
    summary: Subscribe/unsubscribe for real-time trade updates.
    messages:
      - $ref: '#/channels/trades/messages/TradesSubscribeRequest'
      - $ref: '#/channels/trades/messages/TradesUnsubscribeRequest'
  Trades:
    action: send
    channel:
      $ref: '#/channels/trades'
    summary: Real-time trade updates.
    messages:
      - $ref: '#/channels/trades/messages/TradesSubscriptionRequestAck'
      - $ref: '#/channels/trades/messages/Trades'
  CandlesSubscription:
    action: receive
    channel:
      $ref: '#/channels/ohlc'
    summary: Subscribe/unsubscribe for candle (OHLC) updates.
    messages:
      - $ref: '#/channels/ohlc/messages/CandlesSubscribeRequest'
      - $ref: '#/channels/ohlc/messages/CandlesUnsubscribeRequest'
  Candles:
    action: send
    channel:
      $ref: '#/channels/ohlc'
    summary: Candle (OHLC) updates.
    messages:
      - $ref: '#/channels/ohlc/messages/CandlesSubscriptionRequestAck'
      - $ref: '#/channels/ohlc/messages/Candles'
  QuoteSubscription:
    action: receive
    channel:
      $ref: '#/channels/L1'
    summary: Subscribe for top of book updates.
    messages:
      - $ref: '#/channels/L1/messages/QuoteSubscribeRequest'
      - $ref: '#/channels/L1/messages/QuoteUnsubscribeRequest'
  Quotes:
    action: send
    channel:
      $ref: '#/channels/L1'
    summary: Top of book updates.
    messages:
      - $ref: '#/channels/L1/messages/QuoteSubscriptionRequestAck'
      - $ref: '#/channels/L1/messages/Quotes'
  BookSubscription:
    action: receive
    channel:
      $ref: '#/channels/L2'
    summary: Subscribe/unsubscribe for order book updates.
    messages:
      - $ref: '#/channels/L2/messages/BookSubscribeRequest'
      - $ref: '#/channels/L2/messages/BookUnsubscribeRequest'
  Book:
    action: send
    channel:
      $ref: '#/channels/L2'
    summary: Order book updates.
    messages:
      - $ref: '#/channels/L2/messages/BookSubscriptionRequestAck'
      - $ref: '#/channels/L2/messages/BookItems'
  Heartbeat:
    action: send
    channel:
      $ref: '#/channels/heartbeat'
    summary: >-
      The `heartbeat` channel provides a mechanism to verify that the connection
      is alive.
    messages:
      - $ref: '#/channels/heartbeat/messages/Heartbeat'
  Ping:
    action: receive
    channel:
      $ref: '#/channels/ping'
    summary: >-
      Clients can `ping` the server to verify connection is alive and the server
      will respond with a `pong`. This is an application level ping, distinct
      from the protocol-level ping in the WebSockets standard.
    messages:
      - $ref: '#/channels/ping/messages/Ping'
  Pong:
    action: send
    channel:
      $ref: '#/channels/ping'
    summary: Reply to a client's `ping` message.
    messages:
      - $ref: '#/channels/ping/messages/Pong'
